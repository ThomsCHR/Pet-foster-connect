services:

  # ===================== BDD ================
  pfc_db:
    container_name: PFC_db
    image: postgres:17
    restart: always
    networks:
      - PFC_network
    volumes:
      - PFC_db-volume:/var/lib/postgresql/data
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Pas de "ports" ici : la BDD n'est pas accessible depuis l'extérieur en prod
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  # ===================== API ================
  pfc_api:
    container_name: PFC_api
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    restart: always
    env_file:
      - .env.prod
    environment:
      PORT: 3003
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@PFC_db:5432/${POSTGRES_DB}
      NODE_ENV: production
    # Pas de "ports" exposés : Nginx fait le proxy en interne
    networks:
      - PFC_network
    depends_on:
      pfc_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ===================== CLIENT ================
  pfc_client:
    container_name: PFC_client
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        # L'URL de l'API vue depuis le navigateur (ton domaine ou IP du serveur)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: always
    ports:
      - "80:80"   # Seul port exposé : le site web
    networks:
      - PFC_network
    depends_on:
      pfc_api:
        condition: service_healthy

networks:
  PFC_network:

volumes:
  PFC_db-volume:
